# =============================================================================
# Research Feedback Processing & Insights Platform
# GitHub Actions CI/CD Pipeline for Azure Static Web Apps
# =============================================================================

name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd src/frontend
          npm ci

      - name: Build frontend
        run: |
          cd src/frontend
          echo "VITE_AZURE_SPEECH_KEY is set: ${{ secrets.AZURE_SPEECH_KEY != '' }}"
          echo "VITE_AZURE_SPEECH_REGION is set: ${{ secrets.AZURE_SPEECH_REGION != '' }}"
          npm run build
        env:
          VITE_AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
          VITE_AZURE_SPEECH_REGION: ${{ secrets.AZURE_SPEECH_REGION }}

      - name: Verify build output
        run: |
          echo "Checking if speech config is in the build..."
          grep -l "subscriptionKey" src/frontend/dist/assets/*.js || echo "Checking build contents"
          ls -la src/frontend/dist/assets/

      - name: Deploy to Azure Static Web Apps
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          # Frontend source location (for build) or output location
          app_location: "src/frontend"
          # Frontend build output directory
          output_location: "dist"
          # API location (Python Azure Functions)
          api_location: "src/api"
          # Skip app build since we already built it
          skip_app_build: true
        env:
          # Enable Oryx remote build for Python dependencies (including native packages like pymssql)
          ENABLE_ORYX_BUILD: true

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
          app_location: "src/frontend"
